# Produkcyjny serwer: PWA (statyk) + proxy /api do backendu (PHP-FPM).
# Ten sam origin → brak CORS. Nasłuch na 80 (mapowane na 4050 hosta).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25M;

    # API → Laravel (php-fpm w kontenerze "app").
    # SCRIPT_FILENAME wskazuje plik w kontenerze app, nie w nginx.
    location /api/ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_read_timeout 60s;
    }

    # Healthcheck Laravela.
    location = /up {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
    }

    # PWA / SPA — fallback na index.html dla tras klienta.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache statycznych zasobów z hashem.
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
