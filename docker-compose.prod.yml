# Rekruter — środowisko produkcyjne (DESIGN.md sekcja 14).
# Różnice względem dev: bez MinIO/Mailpit (realny S3 + SMTP z .env),
# obrazy budowane (bez montowania źródeł), restart policy, brak seeda.
#
# Uruchomienie: docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["sh", "/var/www/html/docker/entrypoint.sh"]
    command: ["php-fpm"]
    env_file: ./backend/.env
    environment:
      RUN_SEED: "false"
    # Wolumen zasilany z obrazu (kod aplikacji) — współdzielony z nginx.
    # Po aktualizacji obrazu odtwórz wolumen: docker compose down -v && up.
    volumes:
      - app_code:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - app_code:/var/www/html:ro
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile.queue
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
    ports:
      - "3000:3000"
    depends_on:
      - nginx

volumes:
  pg_data:
  app_code:
