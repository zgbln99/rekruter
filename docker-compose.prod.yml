# Rekruter — środowisko produkcyjne, jeden port publiczny: 4050.
#
# Architektura: kontener "web" (nginx) serwuje PWA i proxuje /api do "app"
# (PHP-FPM). Ten sam origin → brak CORS. Tylko port 4050 wystawiony na zewnątrz.
# Storage (S3) realizuje wbudowane MinIO (wewnętrzne) — docelowo można przełączyć
# na MEGA S3 edytując AWS_ENDPOINT w backend/.env.
#
# Uruchomienie:
#   cp .env.example .env
#   cp backend/.env.example backend/.env   # ustaw APP_KEY (komenda w README), hasła
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  # Storage S3-compatible (wewnętrzne, niepubliczne).
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY}; do sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/${AWS_BUCKET};
      exit 0;
      "

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped

  # Backend API (PHP-FPM). Migracje + seed startowy w entrypoint.
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["sh", "/var/www/html/docker/entrypoint.sh"]
    command: ["php-fpm"]
    env_file: ./backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      MAIL_MAILER: log         # brak SMTP → e-maile do logu (skonfiguruj realny SMTP w .env)
      RUN_SEED: "true"         # idempotentne: admin + etapy pipeline przy 1. starcie
      # Storage dokumentów (konfiguracja w głównym ./.env):
      DOCUMENTS_DISK: ${DOCUMENTS_DISK:-s3}
      MEGA_S4_ACCESS_KEY_ID: ${MEGA_S4_ACCESS_KEY_ID:-}
      MEGA_S4_SECRET_ACCESS_KEY: ${MEGA_S4_SECRET_ACCESS_KEY:-}
      MEGA_S4_BUCKET: ${MEGA_S4_BUCKET:-driver-ddd-files}
      MEGA_S4_ENDPOINT: ${MEGA_S4_ENDPOINT:-https://s3.eu-luxembourg.megas4.com}
      MEGA_S4_REGION: ${MEGA_S4_REGION:-eu-amsterdam}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Worker kolejek (PDF, mail).
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile.queue
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      MAIL_MAILER: log
      DOCUMENTS_DISK: ${DOCUMENTS_DISK:-s3}
      MEGA_S4_ACCESS_KEY_ID: ${MEGA_S4_ACCESS_KEY_ID:-}
      MEGA_S4_SECRET_ACCESS_KEY: ${MEGA_S4_SECRET_ACCESS_KEY:-}
      MEGA_S4_BUCKET: ${MEGA_S4_BUCKET:-driver-ddd-files}
      MEGA_S4_ENDPOINT: ${MEGA_S4_ENDPOINT:-https://s3.eu-luxembourg.megas4.com}
      MEGA_S4_REGION: ${MEGA_S4_REGION:-eu-amsterdam}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Panel rekrutera (PWA) + reverse proxy /api. Trafia tu subdomena panel.*
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.web
      args:
        NUXT_PUBLIC_API_BASE: /api/v1
    restart: unless-stopped
    ports:
      - "4050:80"
    depends_on:
      - app

  # Publiczna strona kariery (oferty) — domena główna. Serwuje Laravela.
  careers-web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./infra/nginx/careers.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/html/public:ro
    ports:
      - "4060:80"
    depends_on:
      - app

volumes:
  pg_data:
  minio_data:
