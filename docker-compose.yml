# Rekruter — środowisko deweloperskie (DESIGN.md sekcja 14).
# Uruchomienie: cp .env.example .env && docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-rekruter}
      POSTGRES_USER: ${DB_USERNAME:-rekruter}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-rekruter}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible storage na dev (docelowo MEGA S3).
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-rekruter}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-rekruter-secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # Tworzy bucket przy starcie.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-rekruter} ${AWS_SECRET_ACCESS_KEY:-rekruter-secret}; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/${AWS_BUCKET:-rekruter};
      exit 0;
      "

  # Poczta deweloperska (UI: http://localhost:8025).
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  # HTML -> PDF (Chromium headless).
  gotenberg:
    image: gotenberg/gotenberg:8
    ports:
      - "3001:3000"

  # Backend API (PHP-FPM).
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["sh", "/var/www/html/docker/entrypoint.sh"]
    command: ["php-fpm"]
    env_file: ./backend/.env
    environment:
      RUN_SEED: "true"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Web server dla backendu (http://localhost:8000).
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  # Worker kolejek.
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile.queue
    env_file: ./backend/.env
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend PWA (http://localhost:3000).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - nginx

volumes:
  pg_data:
  minio_data:
