# Publiczna strona kariery (oferty) — serwuje Laravela na domenie głównej.
# Statyki (np. careers.css) z zamontowanego ./backend/public, PHP do kontenera "app".
server {
    listen 80;
    server_name _;

    root /var/www/html/public;   # = zamontowane ./backend/public (ścieżka jak w app)
    index index.php;

    client_max_body_size 25M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        # Render ofert jest szybki, ale zostawiamy zapas (np. generowanie czegokolwiek).
        fastcgi_read_timeout 120s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
