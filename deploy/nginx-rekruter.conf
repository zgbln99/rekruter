# Rekruter — proxy w istniejącym nginx na hoście (obok innej strony).
# Skopiuj do /etc/nginx/sites-available/rekruter, podmień domenę,
# włącz symlinkiem i uruchom certbota (patrz HTTPS.md, sekcja „istniejący nginx").
#
# Rekruter (kontener web) słucha na 127.0.0.1:4050 — nic nie zmieniamy w docker-compose.

server {
    listen 80;
    listen [::]:80;
    server_name panel.twojadomena.pl;   # <-- PODMIEŃ na swoją subdomenę

    client_max_body_size 25M;            # uploady dokumentów

    location / {
        proxy_pass http://127.0.0.1:4050;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;          # generowanie grafik AI bywa wolne
    }
}
