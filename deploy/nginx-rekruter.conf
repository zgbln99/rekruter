# Rekruter — proxy w istniejącym nginx na hoście (obok innej strony).
# Skopiuj do /etc/nginx/sites-available/rekruter, podmień domenę,
# włącz symlinkiem i uruchom certbota (patrz HTTPS.md, sekcja „istniejący nginx").
#
# Architektura po rozdzieleniu:
#   - domena główna   → publiczne oferty pracy (kontener careers-web, 127.0.0.1:4060)
#   - panel.domena    → panel rekrutera + /api (kontener web, 127.0.0.1:4050)
#
# Wymaga rekordów DNS A: twojadomena.pl ORAZ panel.twojadomena.pl → IP serwera.

# --- Strona główna: publiczne oferty pracy ---
server {
    listen 80;
    listen [::]:80;
    server_name twojadomena.pl www.twojadomena.pl;   # <-- PODMIEŃ

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:4060;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# --- Panel rekrutera (subdomena) ---
server {
    listen 80;
    listen [::]:80;
    server_name panel.twojadomena.pl;   # <-- PODMIEŃ na swoją subdomenę

    client_max_body_size 25M;            # uploady dokumentów

    location / {
        proxy_pass http://127.0.0.1:4050;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;          # generowanie grafik AI bywa wolne
    }
}
